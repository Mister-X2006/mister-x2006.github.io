<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rot-Blau Blink-Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Sehr schneller Übergang für den harten Wechsel */
            transition: background-color 0.01s steps(1);
        }
        .controls {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        /* Verstecke Steuerung, wenn inaktiv */
        .ui-hidden .controls {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
        .no-select {
            user-select: none;
        }
    </style>
</head>
<body class="bg-black flex items-center justify-center font-sans no-select">

    <!-- Steuerungspanel -->
    <div id="ui-panel" class="controls p-8 rounded-2xl shadow-2xl z-10 text-white max-w-md w-full mx-4">
        <h1 class="text-2xl font-bold mb-2 text-center text-red-500">Warnung: Intensives Blinken</h1>
        <p class="text-xs text-gray-300 mb-6 text-center">Wechsel zwischen Rot und Blau</p>
        
        <div class="space-y-6">
            <!-- Intervall Rot -->
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-medium text-red-400">Dauer Rot (ms)</label>
                    <span id="red-val" class="text-sm font-mono">500</span>
                </div>
                <input type="range" id="red-range" min="10" max="2000" value="500" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-600">
            </div>

            <!-- Intervall Blau -->
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-medium text-blue-400">Dauer Blau (ms)</label>
                    <span id="blue-val" class="text-sm font-mono">500</span>
                </div>
                <input type="range" id="blue-range" min="10" max="2000" value="500" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>

            <div class="flex items-center space-x-2">
                <input type="checkbox" id="sync-checkbox" class="w-4 h-4 rounded border-gray-300 cursor-pointer">
                <label for="sync-checkbox" class="text-sm cursor-pointer">Intervalle synchronisieren</label>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col space-y-3 pt-4">
                <button id="fullscreen-start-btn" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    Vollbild & Start
                </button>
                
                <div class="flex space-x-3">
                    <button id="start-btn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                        Start
                    </button>
                    <button id="stop-btn" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg transition-colors hidden">
                        Stopp
                    </button>
                </div>
            </div>
        </div>

        <p class="text-xs text-gray-400 mt-6 text-center italic">
            Bewege die Maus für das Menü.<br>
            'ESC' zum Beenden.
        </p>
    </div>

    <script>
        const redRange = document.getElementById('red-range');
        const blueRange = document.getElementById('blue-range');
        const redVal = document.getElementById('red-val');
        const blueVal = document.getElementById('blue-val');
        const syncCheckbox = document.getElementById('sync-checkbox');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const fullscreenBtn = document.getElementById('fullscreen-start-btn');
        const body = document.body;

        let isRunning = false;
        let timer = null;
        let uiTimeout = null;

        function updateValues() {
            redVal.textContent = redRange.value;
            blueVal.textContent = blueRange.value;
            if (syncCheckbox.checked) {
                blueRange.value = redRange.value;
                blueVal.textContent = redRange.value;
            }
        }

        redRange.addEventListener('input', () => {
            if (syncCheckbox.checked) blueRange.value = redRange.value;
            updateValues();
        });

        blueRange.addEventListener('input', updateValues);

        // Die eigentliche Blink-Logik (Wechsel zwischen Rot und Blau)
        function toggleFlash(isRed) {
            if (!isRunning) return;
            
            if (isRed) {
                body.style.backgroundColor = 'red';
                timer = setTimeout(() => toggleFlash(false), parseInt(redRange.value));
            } else {
                body.style.backgroundColor = 'blue';
                timer = setTimeout(() => toggleFlash(true), parseInt(blueRange.value));
            }
        }

        function startBlinking() {
            isRunning = true;
            startBtn.classList.add('hidden');
            fullscreenBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            toggleFlash(true);
            hideUI();
        }

        function stopBlinking() {
            isRunning = false;
            clearTimeout(timer);
            startBtn.classList.remove('hidden');
            fullscreenBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            body.style.backgroundColor = 'black';
            showUI();
        }

        startBtn.addEventListener('click', startBlinking);
        stopBtn.addEventListener('click', stopBlinking);

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error("Vollbild-Fehler:", err.message);
                });
            }
            startBlinking();
        });

        function hideUI() {
            if (isRunning) body.classList.add('ui-hidden');
        }

        function showUI() {
            body.classList.remove('ui-hidden');
            clearTimeout(uiTimeout);
            if (isRunning) uiTimeout = setTimeout(hideUI, 2000);
        }

        window.addEventListener('mousemove', showUI);
        window.addEventListener('touchstart', showUI);
        window.addEventListener('keydown', (e) => {
            showUI();
            if (e.key === 'Escape' && isRunning) stopBlinking();
        });

        updateValues();
    </script>
</body>
</html>
