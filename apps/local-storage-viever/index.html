<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LocalStorage Editor</title>

<style>
:root {
  --bg: #0f172a;
  --panel: #111827;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #3b82f6;
  --danger: #ef4444;
  --border: #1f2937;
}

[data-theme="light"] {
  --bg: #f3f4f6;
  --panel: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --accent: #2563eb;
  --danger: #dc2626;
  --border: #e5e7eb;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

button {
  cursor: pointer;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--accent);
  color: white;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}

.list {
  max-height: 60vh;
  overflow-y: auto;
}

.item {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.item:hover {
  background: rgba(59,130,246,0.1);
}

.actions {
  display: flex;
  gap: 8px;
}

.danger {
  background: var(--danger);
}

.small {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>
<header>
  <div><b>LocalStorage Editor</b></div>
  <button onclick="toggleTheme()">🌗 Theme</button>
</header>

<div class="container">

  <!-- LIST -->
  <div class="panel">
    <h3>Einträge</h3>
    <div class="list" id="list"></div>
    <button onclick="refresh()">🔄 Refresh</button>
  </div>

  <!-- EDITOR -->
  <div class="panel">
    <h3>Editor</h3>

    <div class="small">Key</div>
    <input id="key" placeholder="key">

    <div class="small">Value</div>
    <textarea id="value" rows="10" placeholder="value"></textarea>

    <div class="actions">
      <button onclick="save()">💾 Speichern</button>
      <button class="danger" onclick="removeItem()">🗑 Löschen</button>
      <button onclick="clearFields()">➕ Neu</button>
    </div>
  </div>

</div>

<script>
let selectedKey = null;

function refresh() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(localStorage).sort().forEach(key => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = key;

    div.onclick = () => load(key);

    list.appendChild(div);
  });
}

function load(key) {
  selectedKey = key;
  document.getElementById("key").value = key;
  document.getElementById("value").value = localStorage.getItem(key);
}

function save() {
  const key = document.getElementById("key").value;
  const value = document.getElementById("value").value;

  if (!key) return;

  localStorage.setItem(key, value);
  selectedKey = key;
  refresh();
}

function removeItem() {
  if (!selectedKey) return;
  localStorage.removeItem(selectedKey);
  clearFields();
  refresh();
}

function clearFields() {
  selectedKey = null;
  document.getElementById("key").value = "";
  document.getElementById("value").value = "";
}

function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute("data-theme");
  root.setAttribute("data-theme", current === "light" ? "dark" : "light");
}

// init theme
document.documentElement.setAttribute("data-theme", "dark");
refresh();
</script>

</body>
</html>
